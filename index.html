<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI | Next-Gen Platform</title>
    
    <!-- Fonts: JetBrains Mono (Headers), Inter (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --forsythia: #FFC801;
            --nocturnal: #114C5A;
            --arctic: #F1F6F4;
            --saffron: #FF9932;
            --noir: #172B36;
            --mint: #D9E8E2;
            --noirDeep: #0E1E26;
        }
        body { background-color: var(--noirDeep); color: var(--arctic); font-family: 'Inter', sans-serif; }
        .font-display { font-family: 'JetBrains Mono', monospace; }
        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
        .bento-wide { grid-column: span 2; }
        .bento-tall { grid-row: span 2; }
        .card { background: var(--noir); border: 1px solid rgba(255,200,1,0.12); }
        .active-btn { background: linear-gradient(135deg, var(--forsythia), var(--saffron)); color: var(--noir); }
        @media (max-width: 768px) { .bento-grid { display: block; } }
        /* Smooth Accordion */
        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="sticky top-0 z-50 bg-[#0E1E26]/80 backdrop-blur-md border-b border-forsythia/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="font-display font-black text-2xl tracking-tighter text-forsythia uppercase">Nexus<span class="text-arctic">AI</span></a>
            <a href="#pricing" class="bg-forsythia text-noir font-bold px-6 py-2 rounded-full text-sm uppercase tracking-wider hover:bg-saffron transition-all">Get Started</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="py-24 px-6 text-center">
        <h1 class="font-display font-black text-6xl md:text-8xl leading-[0.9] tracking-tighter mb-8 uppercase">
            Automate The <br>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-[#FFC801] to-[#FF9932]">Neural Flow.</span>
        </h1>
        <p class="text-xl text-arctic/60 max-w-md mx-auto">Zero code. 100% reliability. The future of data infrastructure.</p>
    </section>

    <!-- Feature Bento -->
    <section id="features" class="py-24 max-w-7xl mx-auto px-6">
        <h2 class="font-display font-black text-4xl mb-12">Core Capabilities</h2>
        <div class="bento-grid" id="feature-container">
            <!-- Bento / Accordion Items -->
            <div class="card p-8 bento-wide cursor-pointer" onclick="toggleAcc(this)">
                <h3 class="font-bold text-xl mb-2">Neural Engine</h3>
                <div class="acc-content"><p>Proprietary AI core processing 50M+ events/sec.</p></div>
            </div>
            <div class="card p-8 bento-tall cursor-pointer" onclick="toggleAcc(this)">
                <h3 class="font-bold text-xl mb-2">Predictive Analytics</h3>
                <div class="acc-content"><p>Forecast trends 30 days ahead.</p></div>
            </div>
            <div class="card p-8 cursor-pointer" onclick="toggleAcc(this)">
                <h3 class="font-bold text-xl mb-2">Universal Connect</h3>
                <div class="acc-content"><p>300+ pre-built integrations.</p></div>
            </div>
        </div>
    </section>

    <!-- Pricing (No Re-render Rule) -->
    <section id="pricing" class="py-24 max-w-7xl mx-auto px-6">
        <div class="flex gap-4 mb-8 justify-center">
            <button id="monthly" class="active-btn px-6 py-2 rounded-full font-bold" onclick="updatePricing('monthly')">Monthly</button>
            <button id="annual" class="bg-noir px-6 py-2 rounded-full font-bold" onclick="updatePricing('annual')">Annual</button>
        </div>
        <div id="pricing-grid" class="grid md:grid-cols-3 gap-8">
            <!-- Prices injected by JS -->
        </div>
    </section>

    <script>
        // Data Matrix (Rule: No Hardcoding)
        const matrix = { starter: 29, pro: 79, scale: 199 };
        const rates = { USD: 1, INR: 83.5, EUR: 0.92 };
        let currentCycle = 'monthly';
        let currentCurrency = 'USD';

        function updatePricing(cycle) {
            currentCycle = cycle || currentCycle;
            document.getElementById('monthly').classList.toggle('active-btn', currentCycle === 'monthly');
            document.getElementById('annual').classList.toggle('active-btn', currentCycle === 'annual');
            
            const multiplier = currentCycle === 'annual' ? 0.8 : 1;
            Object.keys(matrix).forEach(tier => {
                const price = Math.round(matrix[tier] * multiplier * rates[currentCurrency]);
                // Rule: Localized DOM update, no global re-render
                document.getElementById(`price-${tier}`).textContent = `$${price}`;
            });
        }

        function toggleAcc(el) {
            const content = el.querySelector('.acc-content');
            content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
        }

        const container = document.getElementById('pricing-grid');
        Object.keys(matrix).forEach(tier => {
            container.innerHTML += `
                <div class="card p-8">
                    <h3 class="capitalize text-xl font-bold mb-4">${tier}</h3>
                    <div class="text-4xl font-bold mb-6" id="price-${tier}">$${matrix[tier]}</div>
                    <button class="bg-forsythia text-noir font-bold w-full py-3 rounded-lg">Buy Now</button>
                </div>
            `;
        });
    </script>
</body>
</html>
